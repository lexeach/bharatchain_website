[build]
  # The directory to run the build command
  command = "npm run build"
  
  # The directory that contains the deploy-ready HTML/JS
  # Vite outputs to "dist" by default
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200